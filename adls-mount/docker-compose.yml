services:

  azurite:
    image: mcr.microsoft.com/azure-storage/azurite
    command: azurite --blobHost 0.0.0.0 --queueHost 0.0.0.0 --tableHost 0.0.0.0 --skipApiVersionCheck
    ports:
      - "10000:10000"
    healthcheck:
      test: ["CMD", "node", "-e", "require('net').connect(10000,'127.0.0.1').on('connect',()=>process.exit(0)).on('error',()=>process.exit(1))"]
      interval: 3s
      timeout: 5s
      retries: 10
      start_period: 5s

  demo:
    build: .
    # CAP_SYS_ADMIN + /dev/fuse are required for FUSE mounts inside a container.
    # Docker Desktop on macOS routes /dev/fuse through the Linux VM, so this works.
    privileged: true
    devices:
      - /dev/fuse
    cap_add:
      - SYS_ADMIN
    security_opt:
      - apparmor:unconfined
    depends_on:
      azurite:
        condition: service_healthy
    environment:
      AZURITE_HOST: "azurite:10000"
      MOUNT_POINT: "/mnt/adls"
      CONTAINER: "demo"
      CACHE_TTL: "3600"
